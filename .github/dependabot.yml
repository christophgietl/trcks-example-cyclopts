version: 2
updates:
  - package-ecosystem: github-actions
    directories:
      - /
      - /.github/actions/*/
    schedule:
      interval: daily
  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: daily
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: daily
    versioning-strategy: increase

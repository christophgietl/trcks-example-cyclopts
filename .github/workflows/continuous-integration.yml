name: CI

on:
  - push

permissions: { }

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: christophgietl/uv-actions/set-up-uv@e75e1e587602469dee34939418204d0648d6b667 # 2026.6.10
      - run: uv build --verbose
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: christophgietl/uv-actions/set-up-uv@e75e1e587602469dee34939418204d0648d6b667 # 2026.6.10
        with:
          install-and-cache-dependencies: true
      - uses: christophgietl/uv-actions/set-up-pre-commit@e75e1e587602469dee34939418204d0648d6b667 # 2026.6.10
        with:
          cache-key-suffix: ${{ matrix.os }}
      - run: uv run --no-sync pre-commit run --all-files --show-diff-on-failure
      - run: uv run --no-sync mypy
      - run: uv run --no-sync pytest

name: CI

on:
  - push

permissions: { }

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/set-up-uv
      - run: uv build --verbose
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/set-up-uv
        with:
          install-and-cache-dependencies: true
      - uses: ./.github/actions/set-up-pre-commit
        with:
          cache-key-suffix: ${{ matrix.os }}
      - run: uv run --no-sync pre-commit run --all-files --show-diff-on-failure
      - uses: ./.github/actions/run-tests-and-type-checks
